<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProgressIq</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🎯 ProgressIQ</h1>
        <p>Turn Big Goals Into Daily Progress</p>
    </header>

    <main>

        <section id="goal-form">
            <input
                type="text"
                id="goalInput"
                placeholder="Enter Main Goal"
            >

            <button id="addGoalBtn">
                Add Goal
            </button>
        </section>

        <section id="goalContainer">

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
